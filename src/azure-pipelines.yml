trigger:
  branches:
    include:
      - dev

pr:
  branches:
    include:
      - main
      - dev

pool:
  vmImage: 'ubuntu-latest'

variables:
  mavenPomFile: 'pom.xml'
  artifactName: 'askomdch-artifact'
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository

stages:

# ======================
# CI STAGE
# ======================

- stage: Build_Test
  displayName: "Build and Run Tests"

  jobs:
  - job: MavenBuild
    displayName: "Run Maven Build"

    steps:

    # Install Java
    - task: JavaToolInstaller@0
      displayName: "Install Java 17"
      inputs:
        versionSpec: '17'
        jdkArchitectureOption: 'x64'
        jdkSourceOption: 'PreInstalled'

    # Cache Maven dependencies (Speeds up builds)
    - task: Cache@2
      displayName: "Cache Maven Dependencies"
      inputs:
        key: 'maven | "$(Agent.OS)" | pom.xml'
        restoreKeys: |
          maven | "$(Agent.OS)"
        path: $(MAVEN_CACHE_FOLDER)

    # Run Maven Tests
    - task: Maven@3
      displayName: "Run Maven Verify"
      inputs:
        mavenPomFile: '$(mavenPomFile)'
        goals: 'clean verify'
        options: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'

    # Print test failure logs if tests fail
    - script: |
        echo "Printing Surefire Reports..."
        find . -type f -path "*surefire-reports*" -name "*.txt" -exec cat {} \;
      displayName: "Print Test Reports"
      condition: failed()

    # Package the application
    - task: Maven@3
      displayName: "Package Application"
      inputs:
        mavenPomFile: '$(mavenPomFile)'
        goals: 'package'
        options: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'

    # Publish artifacts
    - task: PublishBuildArtifacts@1
      displayName: "Publish Build Artifact"
      inputs:
        PathtoPublish: 'target'
        ArtifactName: $(artifactName)
        publishLocation: 'Container'


# ======================
# DEPLOYMENT - DEV
# ======================

- stage: Development
  displayName: "Deploy to Development"
  dependsOn: Build_Test
  condition: succeeded()

  jobs:
  - deployment: DeployDev
    environment: Development

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: $(artifactName)

          - script: |
              echo "Deploying to Development Environment"
              ls -R
            displayName: "Deploy Dev"


# ======================
# DEPLOYMENT - TEST
# ======================

- stage: Testing
  displayName: "Deploy to Testing"
  dependsOn: Development
  condition: succeeded()

  jobs:
  - deployment: DeployTest
    environment: Testing

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: $(artifactName)

          - script: |
              echo "Deploying to Testing Environment"
              ls -R
            displayName: "Deploy Test"


# ======================
# DEPLOYMENT - PROD
# ======================

- stage: Production
  displayName: "Deploy to Production"
  dependsOn: Testing
  condition: succeeded()

  jobs:
  - deployment: DeployProd
    environment: Production

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: $(artifactName)

          - script: |
              echo "Deploying to Production Environment"
              ls -R
            displayName: "Deploy Production"
